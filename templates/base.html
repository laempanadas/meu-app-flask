<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}La Empanadas{% endblock %}</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        main {
            flex: 1;
        }
        footer {
            background-color: #212529;
            color: #f8f9fa;
        }
        footer a {
            color: #ffc107;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Cabeçalho / Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="{{ url_for('index') }}">La Empanadas</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('privacidade') }}">Política de Privacidade</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('termos') }}">Termos de Uso</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('exclusao') }}">Exclusão de Dados</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <main class="container my-5 bg-white p-5 rounded shadow-sm">
        {% block content %}{% endblock %}
    </main>

    <!-- Rodapé -->
    <footer class="py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-2">&copy; 2026 La Empanadas. Todos os direitos reservados.</p>
            <p class="small">
                <a href="{{ url_for('privacidade') }}">Política de Privacidade</a> | 
                <a href="{{ url_for('termos') }}">Termos de Serviço</a> | 
                <a href="{{ url_for('exclusao') }}">Instruções de Exclusão de Dados</a>
            </p>
            <p class="small text-muted">Contato: contato@laempanadas.com.br</p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
